<h2>AI 预测结果展示</h2>
<p class="subtitle">选择预测比分在界面中的呈现方式</p>

<div class="options">
  <div class="option" data-choice="simple" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简洁文本</h3>
      <p>一行文字显示预测比分和置信度</p>
      <div class="mockup">
        <div class="mockup-header">预览</div>
        <div class="mockup-body" style="padding:16px;background:#f5f5f5;">
          <div style="font-size:14px;color:#666;">巴西 vs 克罗地亚</div>
          <div style="margin-top:8px;color:#0d47a1;font-size:15px;">
            🤖 AI预测: 2-1 (置信度 72%)
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="progress" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>概率条</h3>
      <p>用进度条展示胜负平概率，更直观</p>
      <div class="mockup">
        <div class="mockup-header">预览</div>
        <div class="mockup-body" style="padding:16px;background:#f5f5f5;">
          <div style="font-size:14px;color:#666;">巴西 vs 克罗地亚</div>
          <div style="margin-top:8px;">
            <div style="font-size:13px;margin-bottom:4px;">🤖 AI预测结果分布</div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <span style="font-size:12px;width:30px;">胜</span>
              <div style="flex:1;height:18px;background:#e0e0e0;border-radius:4px;overflow:hidden;">
                <div style="width:55%;height:100%;background:#4caf50;"></div>
              </div>
              <span style="font-size:12px;">55%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <span style="font-size:12px;width:30px;">平</span>
              <div style="flex:1;height:18px;background:#e0e0e0;border-radius:4px;overflow:hidden;">
                <div style="width:25%;height:100%;background:#9e9e9e;"></div>
              </div>
              <span style="font-size:12px;">25%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:12px;width:30px;">负</span>
              <div style="flex:1;height:18px;background:#e0e0e0;border-radius:4px;overflow:hidden;">
                <div style="width:20%;height:100%;background:#f44336;"></div>
              </div>
              <span style="font-size:12px;">20%</span>
            </div>
            <div style="margin-top:8px;font-size:12px;color:#0d47a1;">
              ⚡ 最可能: 2-1
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="scorecard" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>比分卡</h3>
      <p>模拟记分牌样式，突出预测比分</p>
      <div class="mockup">
        <div class="mockup-header">预览</div>
        <div class="mockup-body" style="padding:16px;background:#f5f5f5;">
          <div style="font-size:14px;color:#666;">巴西 vs 克罗地亚</div>
          <div style="margin-top:10px;background:#1a237e;border-radius:8px;padding:12px;">
            <div style="color:#90caf9;font-size:11px;text-align:center;">🤖 AI 预测</div>
            <div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-top:8px;">
              <div style="text-align:center;">
                <div style="font-size:11px;color:#bbb;">巴西</div>
                <div style="font-size:32px;font-weight:bold;color:#fff;">2</div>
              </div>
              <div style="color:#555;font-size:24px;">:</div>
              <div style="text-align:center;">
                <div style="font-size:11px;color:#bbb;">克罗地亚</div>
                <div style="font-size:32px;font-weight:bold;color:#fff;">1</div>
              </div>
            </div>
            <div style="text-align:center;margin-top:8px;font-size:11px;color:#90caf9;">
              置信度: 72% | 可能性: 高
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
